name: "🚀 Vanguard Project Sync"
on:
  push:
    branches: [main, master, develop, QA]
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  sync:
    name: Sync to Project Board
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Log activity to Project
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.sha.substring(0, 7);
            const branch = context.ref.replace("refs/heads/", "");
            const commit = context.payload.head_commit;
            const msg = commit?.message?.split("\n")[0] || "commit";
            const repoName = context.repo.repo;
            const actor = context.actor;
            const commitUrl = commit?.url || "";
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: repoName,
                name: "vanguard-sync", color: "FF6B35",
                description: "Auto-synced by Vanguard CI/CD"
              });
            } catch(e) {}
            await github.rest.issues.create({
              owner: context.repo.owner, repo: repoName,
              title: `📦 [${branch}] ${msg} (${sha})`,
              body: [
                "## 🚀 Vanguard Activity Log",
                "",
                "| | |","|---|---|",
                `| **Repo** | \`${repoName}\` |`,
                `| **Branch** | \`${branch}\` |`,
                `| **Commit** | [\`${sha}\`](${commitUrl}) |`,
                `| **Author** | @${actor} |`,
                `| **Message** | ${msg} |`,
                "","> 🤖 Auto-generated by Vanguard CI/CD Pipeline"
              ].join("\n"),
              labels: ["vanguard-sync"]
            });

      - name: Add PR to Project Board
        if: github.event_name == 'pull_request'
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/Chexfor/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
